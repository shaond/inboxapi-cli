name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build

  no-ai-attribution:
    name: No AI Attribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for AI attribution in code and docs
        run: |
          # Patterns that must never appear in tracked files
          PATTERNS=(
            'Co-Authored-By:.*Claude'
            'Co-Authored-By:.*Anthropic'
            'Co-Authored-By:.*OpenAI'
            'Co-Authored-By:.*Copilot'
            'Co-Authored-By:.*Gemini'
            'Co-Authored-By:.*Google AI'
            'Generated with.*Claude'
            'Generated by.*Claude'
            'Built with.*Claude'
            'Generated with.*Claude Code'
            'Generated with.*Copilot'
            'Generated by.*Copilot'
            'Built with.*Copilot'
            'Generated with.*Gemini'
            'Generated by.*Gemini'
            'Built with.*Gemini'
            'Generated with.*ChatGPT'
            'Generated by.*ChatGPT'
            'Built with.*ChatGPT'
            'Generated with.*GPT-4'
            'Generated by.*GPT-4'
            'Built with.*GPT-4'
            'AI-generated'
            'Written by AI'
            'Authored by AI'
          )

          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            # Search tracked files, excluding this workflow itself
            MATCHES=$(grep -rniE "$pattern" --include='*.rs' --include='*.md' --include='*.js' --include='*.json' --include='*.toml' --include='*.yml' --include='*.yaml' --include='*.txt' . \
              | grep -v '.github/workflows/ci.yml' \
              | grep -v 'node_modules/' || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::AI attribution found matching '$pattern':"
              echo "$MATCHES"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "AI attribution is not allowed in this repository."
            echo "Remove all AI-generated credit lines before committing."
            exit 1
          fi

          echo "No AI attribution found."

      - name: Check for AI attribution in commit messages
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PATTERNS=(
            'Co-Authored-By:.*Claude'
            'Co-Authored-By:.*Anthropic'
            'Co-Authored-By:.*OpenAI'
            'Co-Authored-By:.*Copilot'
            'Co-Authored-By:.*Gemini'
            'Co-Authored-By:.*Google AI'
            'Co-Authored-By:.*noreply@anthropic'
            'Co-Authored-By:.*noreply@github'
            'Generated with.*Claude'
            'Generated by.*Claude'
            'Built with.*Claude'
          )

          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(git log "$BASE_SHA".."$HEAD_SHA" --format='%H %s%n%b' | grep -iE "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::AI attribution found in commit message matching '$pattern':"
              echo "$MATCHES"
              FAILED=1
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "AI attribution is not allowed in commit messages."
            echo "Rewrite commits to remove AI credit lines."
            exit 1
          fi

          echo "No AI attribution found in commit messages."
